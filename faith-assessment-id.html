:root{--bg:#F8F6F1;--surface:#FFFFFF;--text:#1A1814;--text-muted:#7A7568;--text-light:#B0A99E;--border:#E8E3DC;--accent:#3D3526;--ph:3px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.progress-bar{position:fixed;top:0;left:0;right:0;height:var(--ph);background:var(--border);z-index:100;}
.progress-fill{height:100%;background:var(--accent);transition:width .4s ease;width:0%;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}
#screen-intro{justify-content:center;align-items:center;padding:60px 28px;text-align:center;}
.intro-line{width:48px;height:1px;background:var(--accent);margin:0 auto 32px;}
.intro-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;line-height:1.35;margin-bottom:14px;}
.intro-sub{font-size:13px;color:var(--text-muted);line-height:1.9;margin-bottom:40px;}
.intro-meta{display:flex;gap:28px;justify-content:center;margin-bottom:44px;}
.meta-item{text-align:center;}
.meta-num{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;}
.meta-lbl{font-size:11px;color:var(--text-light);margin-top:3px;}
.btn-primary{display:block;width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:2px;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;letter-spacing:.5px;cursor:pointer;transition:opacity .2s;}
.btn-primary:active{opacity:.85;}
#screen-axis{justify-content:center;align-items:center;padding:56px 28px;text-align:center;}
.axis-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:10px;font-weight:500;color:#fff;letter-spacing:.3px;}
.axis-intro-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;margin-bottom:10px;}
.axis-intro-desc{font-size:13px;color:var(--text-muted);line-height:1.85;margin-bottom:10px;}
.axis-intro-range{font-size:11px;color:var(--text-light);}
#screen-question{padding-top:var(--ph);}
.q-top{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.q-counter{font-size:11px;color:var(--text-light);letter-spacing:.5px;}
.q-axis-tag{font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:.3px;}
.q-body{flex:1;padding:28px 24px 24px;display:flex;flex-direction:column;}
.q-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;line-height:1.7;flex:1;margin-bottom:40px;}
.likert{display:flex;gap:8px;margin-bottom:20px;}
.likert-btn{flex:1;aspect-ratio:1;border:1.5px solid var(--border);background:var(--surface);border-radius:4px;font-size:15px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.likert-btn.selected{border-width:2px;color:#fff;}
.likert-btn:active{transform:scale(.95);}
.likert-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-light);padding:0 2px;margin-bottom:32px;}
.q-nav{display:flex;gap:10px;}
.btn-prev{padding:14px 20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);border-radius:2px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;}
.btn-next{flex:1;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:2px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s;}
.btn-next:disabled{opacity:.35;cursor:default;}
#screen-calc{justify-content:center;align-items:center;padding:48px 28px;text-align:center;}
.calc-ring{width:64px;height:64px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px;}
@keyframes spin{to{transform:rotate(360deg);}}
.calc-text{font-size:14px;color:var(--text-muted);}
#screen-result{padding:0;}
.result-header{padding:52px 28px 32px;text-align:center;border-bottom:1px solid var(--border);}
.result-badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 14px;border-radius:20px;letter-spacing:.3px;margin-bottom:16px;}
.result-typename{font-family:'Playfair Display',serif;font-size:32px;font-weight:600;margin-bottom:6px;}
.result-typesub{font-size:14px;color:var(--text-muted);margin-bottom:4px;}
.result-quote{font-size:13px;color:var(--text-light);font-style:italic;margin-top:16px;line-height:1.7;}
.result-section{padding:28px 24px;border-bottom:1px solid var(--border);}
.section-label{font-size:10px;font-weight:500;letter-spacing:.8px;color:var(--text-light);text-transform:uppercase;margin-bottom:16px;}

.axis-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.axis-bar-label{font-size:12px;font-weight:500;width:80px;flex-shrink:0;}
.axis-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.axis-bar-fill{height:6px;border-radius:3px;transition:width .6s ease;}
.axis-bar-val{font-size:13px;font-weight:500;width:32px;text-align:right;flex-shrink:0;}
.analysis-block{margin-bottom:14px;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.ab-head{padding:12px 16px;font-size:11px;font-weight:500;letter-spacing:.5px;display:flex;align-items:center;gap:8px;}
.ab-head-dot{width:6px;height:6px;border-radius:50%;}
.ab-body{padding:14px 16px;background:#fff;}
.ab-body p{font-size:13.5px;line-height:1.85;color:var(--text-muted);margin-bottom:10px;}
.ab-body p:last-child{margin-bottom:0;}
.flag-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#FFF8F0;border-left:3px solid #E8A44A;border-radius:0 4px 4px 0;margin-bottom:8px;font-size:13px;color:#7A5820;line-height:1.5;}
.encourage-block{padding:36px 28px;text-align:center;background:var(--surface);border-bottom:1px solid var(--border);}
.encourage-verse{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;line-height:1.9;color:var(--text);margin-bottom:8px;white-space:pre-line;}
.encourage-ref{font-size:12px;color:var(--text-light);margin-bottom:20px;}
.encourage-msg{font-size:13px;color:var(--text-muted);line-height:1.9;}
.action-btns{padding:20px 24px 48px;display:flex;flex-direction:column;gap:10px;}
.btn-outline{padding:14px;background:transparent;border:1px solid var(--border);border-radius:2px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;text-align:center;}
.btn-retry{padding:14px;background:transparent;border:1px solid var(--accent);border-radius:2px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--accent);cursor:pointer;text-align:center;}
</style>
</head>

  {name:'Berakar',sub:'Orang beriman yang mengakar dalam',quote:'"Firman telah menjadi standar hidupku."',color:'#534AB7',light:'#EEEDFE',
   p:{Karakter:88,Spiritualitas:90,Lingkungan:72,Energi:70},

   encourage:{verse:'"Aku telah memanggil engkau dengan namamu; engkau adalah milik-Ku.\nApabila engkau menyeberangi air, Aku akan menyertai engkau."',ref:'Yesaya 43:1–2',msg:'Anda adalah pribadi berharga yang dipanggil oleh nama di hadapan Tuhan. Perjalanan iman yang telah Anda jalani tidak sia-sia. Tangan-Nya akan menyertai setiap langkah ke depan.'},
   analyze(norm,ans){const f=norm['Spiritualitas'],c=norm['Karakter'],e=norm['Energi'];return{traits:[`Skor Spiritualitas Anda ${f} menunjukkan kepercayaan pada Firman dan keyakinan spiritual Anda telah teguh. ${f>=75?'Respons tinggi muncul dalam keyakinan alkitabiah dan jaminan keselamatan — tanda bahwa iman Anda berdiri di atas fondasi batin yang tidak tergoyahkan.':'Kerinduan Anda terhadap Firman terus bertumbuh, dan perjalanan itu berharga.'}`,`Dalam domain Karakter, skor Anda ${c} menunjukkan ${c>=75?'orang lain mempercayai Anda, dan rasa tanggung jawab Anda untuk menyelesaikan sesuatu sangat menonjol. Fakta bahwa iman dan kehidupan sehari-hari terhubung dalam diri Anda adalah kekuatan terbesar Anda.':'bahwa iman dan karakter semakin selaras — keseimbangan yang akan menjadi fondasi yang baik ke depannya.'}`,`Seiring iman semakin dalam, ada kecenderungan untuk menetapkan standar tinggi bagi diri sendiri atau mencoba menanggung harapan orang lain sendirian. Mempertahankan komitmen Anda sambil mengizinkan diri momen-momen kelonggaran adalah kebijaksanaan yang diperlukan untuk perjalanan panjang.`],growth:[`Skor Spiritualitas (${f}) dan Karakter (${c}) yang secara konsisten tinggi berarti Anda telah bekerja keras untuk menyelaraskan iman dan kehidupan. Pertumbuhan yang lebih besar dari sini bukan dengan memulai sesuatu yang baru, tetapi dengan semakin mendalam di sepanjang jalan yang sedang Anda jalani.`,`Melihat skor Energi Anda (${e}): ${e>=60?'masih ada energi untuk arah baru. Menyalurkan ini ke berbagi dan koneksi akan membuat iman Anda semakin kaya.':'reservoir batin Anda perlu diisi kembali. Beristirahat dan memprioritaskan kehidupan batin — tanpa tekanan — juga merupakan bagian dari pertumbuhan.'}`],counsel:[`Apa yang akan membantu Anda sekarang bukan "usaha lebih keras" tetapi "lebih jujur". Akui apa yang sudah Anda lakukan dengan baik, dan hargai iman yang mengalir secara alami dari tempat itu.`,'Sengaja menciptakan ruang untuk berbagi cerita Anda dengan orang lain dalam komunitas dan berjalan bersama mereka akan menjadi sumber kekuatan besar di jalan ke depan.']};}

  {name:'Bibit',sub:'Orang beriman yang kaya akan potensi',quote:'"Saya penasaran dengan kebenaran — saya ingin tahu lebih banyak."',color:'#0F6E56',light:'#E1F5EE',
   p:{Karakter:82,Spiritualitas:55,Lingkungan:65,Energi:72},
   rankDesc:'Karakter yang hangat sudah ada, dan benih-benih iman mulai bertumbuh.',
   encourage:{verse:'"Dia yang telah memulai pekerjaan baik dalam dirimu\nakan membawanya kepada kesempurnaan hingga hari Kristus Yesus."',ref:'Filipi 1:6',msg:'Benih yang ditanam dalam diri Anda pasti akan bertumbuh. Tidak perlu terburu-buru. Seperti apa adanya Anda, selangkah demi selangkah — itu sudah cukup.'},
   analyze(norm,ans){const f=norm['Spiritualitas'],c=norm['Karakter'],e=norm['Energi'];return{traits:[`Skor Karakter Anda ${c} sangat tinggi. ${c>=75?'Anda secara alami mendekati orang lain dengan kehangatan dan mempertahankan sikap yang hormat. Kualitas-kualitas ini adalah karunia berharga dalam komunitas iman.':'Ada keinginan tulus untuk berbagi kehangatan dalam hubungan.'}`,`Skor Spiritualitas Anda saat ini ${f}, yang mungkin berarti keyakinan penuh pada Firman belum berakar. ${f>=50?'Namun kerinduan mendalam untuk lebih mengenal Kitab Suci sudah ada — tanda bahwa benih siap bertunas.':'Musim mulai terlibat dengan Firman ini sangat berharga dalam perjalanan iman.'}`,`Memiliki karakter yang kuat sementara iman masih semakin dalam berarti potensi pertumbuhan ke depan sangat besar. Namun, karakter dan iman yang mendalam tidak selalu berjalan beriringan — waktu untuk bergumul dengan pertanyaan-pertanyaan jujur tentang kebenaran diperlukan.`],growth:[`Yang paling Anda butuhkan sekarang adalah keterlibatan sistematis dengan Firman dan seseorang yang berjalan bersama Anda. Karena tanah karakter sudah siap, benih Firman, begitu ditanam, dapat bertumbuh dengan kecepatan yang luar biasa.`,`Skor Energi Anda (${e}) menunjukkan ${e>=65?'ada energi untuk sesuatu yang baru. Coba hubungkan energi itu dengan studi Alkitab.':'memulai dengan satu pertemuan kecil yang tidak memberatkan daripada mencoba terlalu banyak sekaligus.'}`],counsel:['Anda mungkin bertanya-tanya, "Apakah tidak apa-apa bahwa saya masih belum banyak tahu?" Namun musim penasaran dan kerinduan seperti sekarang inilah saat iman cenderung tumbuh paling cepat.','Tetaplah hadir secara alami di komunitas dengan karakter hangat Anda, dan bawalah pertanyaan-pertanyaan jujur Anda. Tidak perlu terburu-buru menuju jawaban.']};}

  {name:'Beralas',sub:'Orang beriman dengan lingkungan yang baik',quote:'"Saya bersyukur memiliki orang-orang baik di sekitar saya."',color:'#185FA5',light:'#E6F1FB',
   p:{Karakter:65,Spiritualitas:60,Lingkungan:88,Energi:68},
   rankDesc:'Keadaan hidup dan jaringan dukungan stabil, menciptakan kondisi ideal untuk berfokus pada iman.',
   encourage:{verse:'"Aku bersyukur kepada Kristus Yesus Tuhan kita\nyang telah menganggap aku layak dan mempercayakan pelayanan kepadaku."',ref:'1 Timotius 1:12',msg:'Lingkungan yang baik dan orang-orang di sekitar Anda bukan kebetulan. Di atas karunia yang Tuhan berikan, mulailah membiarkan akar iman semakin dalam bertumbuh.'},
   analyze(norm,ans){const env=norm['Lingkungan'],f=norm['Spiritualitas'],c=norm['Karakter'];return{traits:[`Skor Lingkungan Anda ${env} tinggi. ${env>=80?'Fakta bahwa keluarga Anda memahami dan mendukung aktivitas iman Anda adalah sumber kekuatan yang luar biasa. Banyak orang menghadapi kesulitan signifikan dalam iman mereka justru karena faktor ini.':'Keadaan yang mengelilingi kehidupan iman Anda sudah disiapkan dengan baik — itu adalah karunia yang berarti.'}`,`Skor Spiritualitas Anda saat ini ${f}, yang berarti keyakinan iman batin mungkin masih berkembang dibandingkan keadaan eksternal Anda. Mendapat manfaat dari lingkungan yang baik dan memiliki keyakinan pribadi adalah cerita yang sedikit berbeda.`,`Lingkungan yang baik saat ini adalah karunia berharga. Di atas fondasi itu, saatnya untuk secara bertahap mulai menjawab pertanyaan batin: "Mengapa saya memilih iman ini?"`],growth:[`Skor Lingkungan yang tinggi (${env}) berarti kondisi optimal untuk pertumbuhan iman yang terfokus sudah ada. Ini adalah musim yang baik untuk secara aktif menggunakan lingkungan itu — untuk bergabung dengan studi Alkitab atau kelompok kecil.`,`Seiring iman batin (${f}) datang ke keseimbangan dengan lingkungan eksternal, akar iman terbentuk yang tidak dapat tergoyahkan bahkan ketika keadaan berubah.`],counsel:['Pertama, ungkapkan rasa syukur kepada orang-orang yang mendorong Anda dan lingkungan yang menghormati iman Anda. Rasa syukur itu bisa menjadi titik awal iman yang sejati.','Kemudian, luangkan waktu untuk merenungkan dengan tenang: "Mengapa saya beriman?" Ketika Anda menemukan jawaban Anda sendiri untuk pertanyaan itu, iman semakin dalam satu langkah lagi.']};}

  {name:'Berbuah',sub:'Orang beriman yang berbuah dalam kehidupan',quote:'"Iman telah menjadi kehidupan sehari-hari saya."',color:'#3B6D11',light:'#EAF3DE',

   encourage:{verse:'"Karena aku yakin bahwa baik maut maupun hidup\ntidak akan dapat memisahkan kita dari kasih Allah."',ref:'Roma 8:38–39',msg:'Tidak ada yang dapat menghentikan kasih Tuhan bagi Anda. Kami sungguh-sungguh menyemangati Anda saat jalan yang sedang Anda jalani ini terus bersinar dalam kasih itu.'},
   analyze(norm,ans){const f=norm['Spiritualitas'],c=norm['Karakter'],env=norm['Lingkungan'],e=norm['Energi'];return{traits:[`Semua empat domain menunjukkan skor yang konsisten tinggi (Karakter ${c} · Spiritualitas ${f} · Lingkungan ${env} · Energi ${e}). Ini berarti iman tidak terkonsentrasi di satu area tetapi telah meresap secara alami ke seluruh kehidupan.`,`Iman tidak hanya tetap sebagai pengetahuan tetapi mengalir ke dalam kehidupan. Memiliki jaminan keselamatan yang tidak tergoyahkan terlepas dari keadaan juga merupakan tanda berharga dari tipe ini.`,`Dengan semua domain seimbang, ada kalanya merasa lelah hanya dari mempertahankan keseimbangan itu, atau bertanya-tanya, "Apakah saya masih bertumbuh?" Ketika momen-momen itu datang, menerimanya sebagai bagian alami dari perjalanan — dengan anugerah yang berlimpah — adalah yang diperlukan.`],growth:['Iman Anda sedang diekspresikan secara alami di berbagai bidang kehidupan. Pertumbuhan yang berarti di musim ini bukan melakukan lebih banyak hal, tetapi lebih dalam menghayati dan bersyukur atas tempat yang sedang Anda jalani.','Waktu untuk berbagi cerita Anda dengan jujur dalam komunitas dan saling mendorong perjalanan masing-masing adalah sumber kekuatan besar di tahap ini.'],counsel:['Akui siapa Anda sekarang. Konfirmasi apa yang telah Anda lakukan dengan baik dan ungkapkan rasa syukur itu dalam iman Anda.','Tindakan berbagi secara alami dalam komunitas iman adalah ekspresi iman paling indah yang dapat Anda tawarkan di musim ini.']};}

  {name:'Padang Gurun',sub:'Orang beriman yang mempertahankan iman meski sulit',quote:'"Keadaan sangat sulit, tapi saya masih ingin melanjutkan iman saya."',color:'#854F0B',light:'#FAEEDA',
   p:{Karakter:68,Spiritualitas:72,Lingkungan:28,Energi:55},
   rankDesc:'Ada kemauan tulus untuk beriman, tetapi lingkungan sekitar dan fondasi kehidupan berada di tempat yang sulit.',
   encourage:{verse:'"Janganlah takut, sebab Aku telah menebus engkau,\nAku telah memanggil engkau dengan namamu; engkau adalah milik-Ku."',ref:'Yesaya 43:1',msg:'Betapa luas dan kasarnya padang gurun yang sedang Anda jalani — Tuhan tahu. Dan bahkan di padang gurun itu, Dia memanggil nama Anda. Anda tidak sendirian.'},
   analyze(norm,ans){const env=norm['Lingkungan'],f=norm['Spiritualitas'];return{traits:[`Skor Lingkungan Anda ${env} mencerminkan kesulitan. Fakta bahwa Anda masih ingin melanjutkan iman dalam kondisi ini sungguh luar biasa.`,`Skor Spiritualitas Anda ${f} menunjukkan bahwa bahkan di tengah lingkungan yang sulit, masih ada kemauan dan kerinduan terhadap iman dari dalam. Berjalan di padang gurun bukan tanda iman yang lemah — itu karena Anda sedang di jalan itu sekarang.`,`Dalam keadaan eksternal yang sesulit ini, pikiran seperti "Mengapa saya seperti ini?" bisa muncul. Namun kesulitan sekarang bukan ketidakmampuan Anda — itu hanyalah situasi Anda saat ini. Izinkan diri Anda untuk pertama-tama mengakui itu.`],growth:['Daripada berusaha lebih keras secara spiritual sekarang, mengatasi satu kesulitan praktis pada satu waktu adalah pertumbuhan yang nyata. Seiring keadaan membaik, iman juga akan semakin dalam secara alami.','Anda tidak harus menyelesaikan semuanya sendiri. Menemukan satu orang yang dapat berbagi situasi Anda dengan jujur adalah langkah tunggal terpenting di musim ini.'],counsel:['Tidak apa-apa untuk mengungkapkan secara jujur kesulitan yang Anda hadapi. Mengatakan "ini sulit" bukan iman yang lemah — itu mengetahui cara merawat diri Anda.','Berlatihlah menemukan satu hal kecil untuk disyukuri setiap hari. Mata yang mencari satu berkas cahaya bahkan di padang gurun yang gelap itulah yang akhirnya membawa Anda maju.']};}

   rankDesc:'Mencari keyakinan tentang iman, membawa pertanyaan-pertanyaan serius dan tulus tentang kebenaran.',
   encourage:{verse:'"Mintalah, maka akan diberikan kepadamu;\ncagilah, maka kamu akan mendapat;\nketuklah, maka pintu akan dibukakan bagimu."',ref:'Matius 7:7',msg:'Pertanyaan-pertanyaan yang Anda bawa mendekatkan Anda pada kebenaran. Tidak perlu terburu-buru menuju jawaban. Mereka yang mencari dengan tulus pasti akan menemukan.'},
   analyze(norm,ans){const f=norm['Spiritualitas'],c=norm['Karakter'],e=norm['Energi'];return{traits:[`Skor Spiritualitas Anda ${f} tidak berarti iman yang lemah — ini menunjukkan bahwa Anda sedang dalam musim pencarian di mana keyakinan belum sepenuhnya terbentuk. Kerinduan mendalam untuk lebih mengenal Kitab Suci adalah titik awal paling berharga dari perjalanan iman.`,`Skor Karakter Anda ${c} menunjukkan investasi tulus dalam hubungan. Bahkan tanpa keyakinan iman penuh, hati yang menghargai orang-orang adalah sinyal bahwa Anda mungkin lebih siap menerima iman daripada yang Anda sadari.`,`Skor Energi Anda ${e} patut dicatat. ${e>=70?'Ada energi batin tinggi untuk hal-hal baru. Energi ini bisa menjadi pendorong pencarian Anda.':'Anda mungkin membawa kelelahan yang signifikan saat ini. Pencarian juga semakin dalam ketika ada energi yang cukup.'}`],growth:['Jangan sembunyikan pertanyaan-pertanyaan dalam diri Anda — bawa keluar. Pertanyaan disambut dalam iman. Menemukan seseorang yang akan bergabung dalam pencarian jawaban adalah jalur pertumbuhan terpenting di musim ini.','Tidak perlu memaksakan diri untuk percaya, atau berpura-pura memiliki keyakinan yang tidak Anda miliki. Pencarian yang jujur adalah jalan paling setia menuju iman yang mendalam.'],counsel:['Yang Anda butuhkan sekarang bukan jawaban tetapi ruang yang aman untuk pertanyaan. Carilah seseorang yang dapat mendengar pertanyaan Anda tanpa menghakimi, seseorang yang hubungannya memungkinkan Anda berbagi keraguan tanpa rasa bersalah.','Iman bukan sesuatu yang dipahami sebelum diterima — iman adalah sesuatu yang semakin jelas seiring Anda berjalan. Langkah berjalan ini sendiri sudah merupakan iman yang mencari.']};}

  {name:'Bertahan',sub:'Orang yang belum melepaskan iman meski kelelahan',quote:'"Saya ingin percaya, tapi sejujurnya saya sangat lelah."',color:'#993556',light:'#FBEAF0',
   p:{Karakter:48,Spiritualitas:76,Lingkungan:33,Energi:38},
   rankDesc:'Kerinduan akan iman sangat dalam, tetapi kelelahan emosional dan lingkungan sangat signifikan.',
   encourage:{verse:'"Marilah kepada-Ku, semua yang kelelahan dan berbeban berat,\nAku akan memberi kelegaan kepadamu.\nPikulah kuk yang Aku pasang dan belajarlah dari-Ku,\nmaka kamu akan mendapat ketenangan jiwamu."',ref:'Matius 11:28–29',msg:'Yang Anda butuhkan sekarang bukan untuk berusaha lebih keras — melainkan untuk beristirahat sejenak. Bahkan istirahat itu adalah sesuatu yang Tuhan sediakan. Tidak apa-apa untuk meletakkan semuanya.'},
   analyze(norm,ans){const f=norm['Spiritualitas'],e=norm['Energi'];return{traits:[`Skor Spiritualitas Anda ${f} menunjukkan ada kerinduan spiritual mendalam dan iman dari dalam. Fakta bahwa Anda masih berpegang teguh meski lelah dan kelelahan bukan bukti iman yang lemah — melainkan bukti iman.`,`Energi yang rendah adalah sinyal kelelahan. Mencoba melakukan lebih banyak secara spiritual dalam keadaan ini mungkin hanya menambah beban.`,`Rasa sakit masa lalu atau keadaan yang sulit saat ini mungkin terasa lebih berat ketika terkait dengan iman. Jika iman mulai terasa seperti beban daripada tempat penyembuhan, itu adalah sinyal untuk berhenti sejenak dan melihat ke belakang — dan butuh keberanian untuk melakukannya.`],growth:['"Beristirahat" adalah pertumbuhan yang paling dibutuhkan sekarang. Memaksakan diri untuk mengisi ketika kelelahan hanya mengarah pada kekosongan yang lebih besar. Memulihkan diri terlebih dahulu adalah langkah pertama yang sesungguhnya dari pertumbuhan iman.','Berlatihlah untuk secara jujur mengatakan kepada setidaknya satu orang, "Saya berjuang." Meminta bantuan bukan kelemahan — melainkan kebijaksanaan.'],counsel:['Tidak apa-apa untuk melihat dengan jujur ke mana hati Anda sekarang. Anda bisa meletakkan perasaan "Saya harus baik-baik saja karena saya beriman."','Iman tidak membuat segalanya lebih sulit. Membawa kelelahan dan rasa sakit Anda persis seperti adanya ke hadapan Tuhan — itulah ekspresi iman yang paling jujur dan indah di musim ini.']};}

  {name:'Awal Mula',sub:'Orang yang mengambil langkah pertama iman',quote:'"Segalanya masih asing, tapi saya ingin belajar perlahan-lahan."',color:'#5F5E5A',light:'#F1EFE8',

   analyze(norm,ans){const f=norm['Spiritualitas'],c=norm['Karakter'],e=norm['Energi'];return{traits:[`Secara keseluruhan, Spiritualitas (${f}), Karakter (${c}), dan Lingkungan semuanya dalam tahap pembentukan awal. Ini bukan tanda kekurangan — ini berarti Anda berdiri di titik awal.`,`Keinginan untuk lebih mengenal Firman atau fakta bahwa Anda menyelesaikan penilaian ini menunjukkan ada minat dan kemauan terhadap iman. Setiap awal memungkinkan pertumbuhan.`,'Merasa asing dan canggung adalah hal yang sangat alami. Yang lebih penting di tahap ini daripada memahami sepenuhnya atau melakukan segalanya dengan sempurna adalah sekadar hadir secara konsisten.'],growth:['Yang paling Anda butuhkan sekarang adalah lingkungan di mana Anda dapat dengan nyaman mempelajari dasar-dasar iman dan seseorang untuk menemani Anda. Daripada mencoba mengetahui segalanya sekaligus, mengalami dan merasakan satu hal pada satu waktu adalah langkah yang tepat untuk musim ini.','Bergabung dengan kelompok kecil atau studi Alkitab dasar tanpa tekanan bisa menjadi titik awal yang baik.'],counsel:['"Belum banyak tahu" sama sekali bukan hal yang memalukan. Ketidakbiasaan yang Anda rasakan sekarang suatu hari akan menjadi kenangan berharga "itulah saat saya mulai."','Anda bisa berjalan dengan kecepatan Anda sendiri. Tanpa membandingkan diri dengan siapapun, pertama-tama bersikap lembut kepada diri sendiri karena berada tepat di sini hari ini.']};}

const MISSION_TYPES=[

function getMissionType(norm,ans){
  const matched=MISSION_TYPES.filter(m=>m.match(norm,ans));
  if(matched.length>0)return matched[0];
  const f=norm['Spiritualitas'],c=norm['Karakter'],e=norm['Energi'];
  if(f>=65&&e>=60)return MISSION_TYPES[0];
  if(c>=65)return MISSION_TYPES[4];
  if(e>=60)return MISSION_TYPES[5];
  return MISSION_TYPES[6];
}

function doClassify(){
  const raw={Karakter:0,Spiritualitas:0,Lingkungan:0,Energi:0};const cnt={Karakter:0,Spiritualitas:0,Lingkungan:0,Energi:0};
  QUESTIONS.filter(q=>q.a!=='Bakat').forEach(q=>{const v=state.answers[q.n]||3;raw[q.a]+=(q.r?6-v:v);cnt[q.a]++;});
  const norm={};AXIS_4.forEach(ax=>{norm[ax]=Math.round(raw[ax]/(cnt[ax]*5)*100);});
  const aptScores={};QUESTIONS.filter(q=>q.a==='Bakat').forEach(q=>{aptScores[q.apt]=state.answers[q.n]||3;});
  const aptRanked=Object.entries(aptScores).sort((a,b)=>b[1]-a[1]);
  let ranked=FAITH_TYPES.map(t=>({...t,d:Math.sqrt(AXIS_4.reduce((s,ax)=>s+WEIGHTS[ax]*Math.pow(norm[ax]-t.p[ax],2),0))})).sort((a,b)=>a.d-b.d);

}

function buildRadar(norm,best){
  const W=300,H=300,cx=150,cy=150,r=80,N=4;
  const pts=AXIS_4.map((ax,i)=>{const a=Math.PI*2*i/N-Math.PI/2,v=norm[ax]/100;return[cx+r*v*Math.cos(a),cy+r*v*Math.sin(a)];});
  const bg=AXIS_4.map((_,i)=>{const a=Math.PI*2*i/N-Math.PI/2;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];});
  const toP=arr=>arr.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';
  const grid=[.25,.5,.75,1].map(s=>{const gp=AXIS_4.map((_,i)=>{const a=Math.PI*2*i/N-Math.PI/2;return[cx+r*s*Math.cos(a),cy+r*s*Math.sin(a)];});return`<path d="${toP(gp)}" fill="none" stroke="#E8E3DC" stroke-width="1"/>`;}).join('');
  const lblDefs=[{ax:'Karakter',x:150,y:48,anchor:'middle'},{ax:'Spiritualitas',x:252,y:154,anchor:'start'},{ax:'Lingkungan',x:150,y:260,anchor:'middle'},{ax:'Energi',x:68,y:154,anchor:'middle'}];
  const lbls=lblDefs.map(d=>`<text x="${d.x}" y="${d.y}" text-anchor="${d.anchor}" font-size="11" fill="${AXIS_COLORS[d.ax]}" font-family="'Inter',sans-serif" font-weight="500">${d.ax}</text>`).join('');
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${grid}<path d="${toP(bg)}" fill="none" stroke="#D5CEC5" stroke-width="1"/><path d="${toP(pts)}" fill="${best.color}" fill-opacity="0.15" stroke="${best.color}" stroke-width="2"/>${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="${best.color}"/>`).join('')}${lbls}</svg>`;
}
