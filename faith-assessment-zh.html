<!DOCTYPE html>
<html lang="zh">
<head>

<title>信仰类型评估</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;600&display=swap');
:root{--bg:#F8F6F1;--surface:#FFFFFF;--text:#1A1814;--text-muted:#7A7568;--text-light:#B0A99E;--border:#E8E3DC;--accent:#3D3526;--ph:3px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.progress-bar{position:fixed;top:0;left:0;right:0;height:var(--ph);background:var(--border);z-index:100;}
.progress-fill{height:100%;background:var(--accent);transition:width .4s ease;width:0%;}
.screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}
#screen-intro{justify-content:center;align-items:center;padding:60px 28px;text-align:center;}
.intro-line{width:48px;height:1px;background:var(--accent);margin:0 auto 32px;}
.intro-title{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:600;line-height:1.45;margin-bottom:14px;}
.intro-sub{font-size:13px;color:var(--text-muted);line-height:1.9;margin-bottom:40px;}
.intro-meta{display:flex;gap:28px;justify-content:center;margin-bottom:44px;}
.meta-item{text-align:center;}
.meta-num{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:600;}
.meta-lbl{font-size:11px;color:var(--text-light);margin-top:3px;}
.btn-primary{display:block;width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:2px;font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .2s;}
.btn-primary:active{opacity:.85;}
#screen-axis{justify-content:center;align-items:center;padding:56px 28px;text-align:center;}
.axis-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:10px;font-weight:500;color:#fff;}
.axis-intro-title{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:600;margin-bottom:10px;}
.axis-intro-desc{font-size:13px;color:var(--text-muted);line-height:1.85;margin-bottom:10px;}
.axis-intro-range{font-size:11px;color:var(--text-light);}
#screen-question{padding-top:var(--ph);}
.q-top{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.q-counter{font-size:11px;color:var(--text-light);}
.q-axis-tag{font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;}
.q-body{flex:1;padding:28px 24px 24px;display:flex;flex-direction:column;}
.q-text{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:400;line-height:1.75;flex:1;margin-bottom:40px;}
.likert{display:flex;gap:8px;margin-bottom:20px;}
.likert-btn{flex:1;aspect-ratio:1;border:1.5px solid var(--border);background:var(--surface);border-radius:4px;font-size:15px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.likert-btn.selected{border-width:2px;color:#fff;}
.likert-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-light);padding:0 2px;margin-bottom:32px;}
.q-nav{display:flex;gap:10px;}
.btn-prev{padding:14px 20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);border-radius:2px;font-family:'Noto Sans SC',sans-serif;font-size:13px;cursor:pointer;}
.btn-next{flex:1;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:2px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s;}
.btn-next:disabled{opacity:.35;cursor:default;}
#screen-calc{justify-content:center;align-items:center;padding:48px 28px;text-align:center;}
.calc-ring{width:64px;height:64px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px;}
@keyframes spin{to{transform:rotate(360deg);}}
.calc-text{font-size:14px;color:var(--text-muted);}
#screen-result{padding:0;}
.result-header{padding:52px 28px 32px;text-align:center;border-bottom:1px solid var(--border);}
.result-badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 14px;border-radius:20px;margin-bottom:16px;}
.result-typename{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:600;margin-bottom:6px;}
.result-typesub{font-size:14px;color:var(--text-muted);margin-bottom:4px;}
.result-quote{font-size:13px;color:var(--text-light);font-style:italic;margin-top:16px;line-height:1.7;}
.result-section{padding:28px 24px;border-bottom:1px solid var(--border);}
.section-label{font-size:10px;font-weight:500;letter-spacing:.6px;color:var(--text-light);text-transform:uppercase;margin-bottom:16px;}
.radar-wrap{display:flex;justify-content:center;margin:4px 0 16px;}
.axis-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.axis-bar-label{font-size:12px;font-weight:500;width:52px;flex-shrink:0;}
.axis-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.axis-bar-fill{height:6px;border-radius:3px;transition:width .6s ease;}
.axis-bar-val{font-size:13px;font-weight:500;width:32px;text-align:right;flex-shrink:0;}
.analysis-block{margin-bottom:14px;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.ab-head{padding:12px 16px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:8px;}
.ab-head-dot{width:6px;height:6px;border-radius:50%;}
.ab-body{padding:14px 16px;background:#fff;}
.ab-body p{font-size:13.5px;line-height:1.85;color:var(--text-muted);margin-bottom:10px;}
.ab-body p:last-child{margin-bottom:0;}
.flag-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#FFF8F0;border-left:3px solid #E8A44A;border-radius:0 4px 4px 0;margin-bottom:8px;font-size:13px;color:#7A5820;line-height:1.5;}
.encourage-block{padding:36px 28px;text-align:center;background:var(--surface);border-bottom:1px solid var(--border);}
.encourage-verse{font-family:'Noto Serif SC',serif;font-size:15px;line-height:1.9;color:var(--text);margin-bottom:8px;white-space:pre-line;}
.encourage-ref{font-size:12px;color:var(--text-light);margin-bottom:20px;}
.encourage-msg{font-size:13px;color:var(--text-muted);line-height:1.9;}
.action-btns{padding:20px 24px 48px;display:flex;flex-direction:column;gap:10px;}
.btn-outline{padding:14px;background:transparent;border:1px solid var(--border);border-radius:2px;font-family:'Noto Sans SC',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;text-align:center;}
.btn-retry{padding:14px;background:transparent;border:1px solid var(--accent);border-radius:2px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:500;color:var(--accent);cursor:pointer;text-align:center;}
</style>
</head>
<body>

<div class="screen" id="screen-question">

    <div class="q-nav">

    </div>
  </div>
</div>
<div class="screen" id="screen-calc"><div class="calc-ring"></div><div class="calc-text">正在分析您的信仰类型...</div></div>
<div class="screen" id="screen-result">

  <div id="resultBody"></div>
  <div class="action-btns">

    <button class="btn-retry" onclick="retry()">重新评估</button>

</div>

function getMissionType(norm,ans){

  if(matched.length>0)return matched[0];
  const f=norm['灵性'],c=norm['品格'],e=norm['能量'];
  if(f>=65&&e>=60)return MISSION_TYPES[0];
  if(c>=65)return MISSION_TYPES[4];
  if(e>=60)return MISSION_TYPES[5];
  return MISSION_TYPES[6];
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');window.scrollTo(0,0);}
function updateProgress(){document.getElementById('progressFill').style.width=Math.round((state.qIdx/QUESTIONS.length)*100)+'%';}
function startAssessment(){state.qIdx=0;state.answers={};showAxisIntro('品格');}
function showAxisIntro(axisId){const info=AXES_INFO.find(a=>a.id===axisId);const el=document.getElementById('axisIcon');el.style.background=info.color;el.textContent=axisId;document.getElementById('axisTitle').textContent=info.title;document.getElementById('axisDesc').textContent=info.desc;document.getElementById('axisRange').textContent=info.range;show('axis');}
function startAxis(){renderQuestion();}
function renderQuestion(){
  if(state.qIdx>=QUESTIONS.length){runClassify();return;}
  const q=QUESTIONS[state.qIdx];const axInfo=AXES_INFO.find(a=>a.id===q.a);
  document.getElementById('qCounter').textContent=`${state.qIdx+1} / ${QUESTIONS.length}`;
  const tag=document.getElementById('qAxisTag');tag.textContent=q.a;tag.style.background=axInfo.light;tag.style.color=axInfo.dark;
  document.getElementById('qText').textContent=q.t;
  const likert=document.getElementById('likert');likert.innerHTML='';const cur=state.answers[q.n];
  [1,2,3,4,5].forEach(v=>{const btn=document.createElement('button');btn.className='likert-btn'+(cur===v?' selected':'');btn.textContent=v;if(cur===v){btn.style.background=axInfo.color;btn.style.borderColor=axInfo.color;}btn.onclick=()=>{state.answers[q.n]=v;document.querySelectorAll('.likert-btn').forEach(b=>{b.classList.remove('selected');b.style.background='';b.style.borderColor='';});btn.classList.add('selected');btn.style.background=axInfo.color;btn.style.borderColor=axInfo.color;document.getElementById('btnNext').disabled=false;};likert.appendChild(btn);});
  document.getElementById('btnNext').disabled=!cur;document.getElementById('btnPrev').style.display=state.qIdx===0?'none':'block';
  updateProgress();show('question');
}
function nextQ(){state.qIdx++;if(state.qIdx<QUESTIONS.length){const q=QUESTIONS[state.qIdx];if(q.a!==QUESTIONS[state.qIdx-1].a)showAxisIntro(q.a);else renderQuestion();}else{runClassify();}}
function prevQ(){if(state.qIdx>0){state.qIdx--;renderQuestion();}}
function runClassify(){show('calc');document.getElementById('progressFill').style.width='100%';setTimeout(doClassify,1400);}
function doClassify(){
  const raw={品格:0,灵性:0,环境:0,能量:0};const cnt={品格:0,灵性:0,环境:0,能量:0};
  QUESTIONS.filter(q=>q.a!=='才能').forEach(q=>{const v=state.answers[q.n]||3;raw[q.a]+=(q.r?6-v:v);cnt[q.a]++;});
  const norm={};AXIS_4.forEach(ax=>{norm[ax]=Math.round(raw[ax]/(cnt[ax]*5)*100);});
  const aptScores={};QUESTIONS.filter(q=>q.a==='才能').forEach(q=>{aptScores[q.apt]=state.answers[q.n]||3;});
  const aptRanked=Object.entries(aptScores).sort((a,b)=>b[1]-a[1]);
  let ranked=FAITH_TYPES.map(t=>({...t,d:Math.sqrt(AXIS_4.reduce((s,ax)=>s+WEIGHTS[ax]*Math.pow(norm[ax]-t.p[ax],2),0))})).sort((a,b)=>a.d-b.d);
  if(norm['灵性']<=40){const c=ranked.filter(t=>t.name==='寻索型'||t.name==='起步型');if(c.length&&c[0].d<ranked[0].d*1.3)ranked=[c[0],...ranked.filter(t=>t.name!==c[0].name)];}
  if(norm['环境']<=35){const c=ranked.filter(t=>t.name==='旷野型'||t.name==='忍耐型');if(c.length&&c[0].d<ranked[0].d*1.3)ranked=[c[0],...ranked.filter(t=>t.name!==c[0].name)];}
  if(AXIS_4.every(ax=>norm[ax]>=78)){const rf=ranked.find(t=>t.name==='结果型');if(rf)ranked=[rf,...ranked.filter(t=>t.name!=='结果型')];}
  const flags=AXIS_4.filter(ax=>norm[ax]<=35).map(ax=>ax+'领域显示出困难的迹象。请随时与辅导者讨论。');
  state.lastResult={ranked,norm,flags,aptRanked};renderResult(ranked,norm,flags,aptRanked);
}
function renderResult(ranked,norm,flags,aptRanked){
  const best=ranked[0];const analysis=best.analyze(norm,state.answers);const mission=getMissionType(norm,state.answers);
  document.getElementById('resultHeader').innerHTML=`<div class="result-badge" style="background:${best.light};color:${best.color}">我的信仰类型</div><div class="result-typename" style="color:${best.color}">${best.name}</div><div class="result-typesub">${best.sub}</div><div class="result-quote">${best.quote}</div>`;
  let body='';
  if(flags.length){body+=`<div class="result-section"><div class="section-label">需要关注的领域</div>${flags.map(f=>`<div class="flag-item">${f}</div>`).join('')}</div>`;}
  body+=`<div class="result-section"><div class="section-label">各领域分数</div><div class="radar-wrap">${buildRadar(norm,best)}</div>${AXIS_4.map(ax=>`<div class="axis-bar-row"><span class="axis-bar-label" style="color:${AXIS_COLORS[ax]}">${ax}</span><div class="axis-bar-bg"><div class="axis-bar-fill" style="width:${norm[ax]}%;background:${AXIS_COLORS[ax]}"></div></div><span class="axis-bar-val">${norm[ax]}</span></div>`).join('')}</div>`;
  body+=`<div class="result-section"><div class="section-label">核心特质</div><div class="analysis-block"><div class="ab-head" style="background:${best.light}"><div class="ab-head-dot" style="background:${best.color}"></div><span style="color:${best.color};font-weight:500">我的故事</span></div><div class="ab-body">${analysis.traits.map(t=>`<p>${t}</p>`).join('')}</div></div></div>`;
  body+=`<div class="result-section"><div class="section-label">前进方向</div><div class="analysis-block"><div class="ab-head" style="background:#EAF3DE"><div class="ab-head-dot" style="background:#3B6D11"></div><span style="color:#3B6D11;font-weight:500">我可以成长的地方</span></div><div class="ab-body">${analysis.growth.map(t=>`<p>${t}</p>`).join('')}</div></div></div>`;
  body+=`<div class="result-section"><div class="section-label">对自己说的话</div><div class="analysis-block"><div class="ab-head" style="background:#E6F1FB"><div class="ab-head-dot" style="background:#185FA5"></div><span style="color:#185FA5;font-weight:500">我现在需要的</span></div><div class="ab-body">${analysis.counsel.map(t=>`<p>${t}</p>`).join('')}</div></div></div>`;
  const aptTop=aptRanked.slice(0,2);const aptBot=aptRanked.slice(-2).reverse();const aptColors=['#534AB7','#0F6E56'];
  body+=`<div class="result-section"><div class="section-label">我的成长才能</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;"><div style="background:#F8F6F1;border-radius:8px;border:1px solid #E8E3DC;padding:16px;"><div style="font-size:10px;font-weight:500;letter-spacing:.4px;color:#0F6E56;text-transform:uppercase;margin-bottom:12px;">成长才能</div>${aptTop.map(([name,score],i)=>{const info=APT_TYPES[name]||{desc:''};const col=aptColors[i];return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div style="font-size:16px;font-weight:600;width:20px;color:${col};font-family:'Noto Serif SC',serif">${i+1}</div><div style="flex:1;"><div style="font-size:13px;font-weight:500;color:#1A1814;margin-bottom:2px;">${name}</div><div style="font-size:11px;color:#B0A99E;line-height:1.5;">${info.desc}</div></div><div style="font-size:12px;font-weight:500;color:${col};flex-shrink:0;">${score}分</div></div>`;}).join('')}</div><div style="background:#F8F6F1;border-radius:8px;border:1px solid #E8E3DC;padding:16px;"><div style="font-size:10px;font-weight:500;letter-spacing:.4px;color:#B0A99E;text-transform:uppercase;margin-bottom:12px;">较不适合</div>${aptBot.map(([name,score])=>{const info=APT_TYPES[name]||{desc:''};return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div style="font-size:11px;color:#B0A99E;width:20px;text-align:center;">—</div><div style="flex:1;"><div style="font-size:13px;font-weight:500;color:#7A7568;margin-bottom:2px;">${name}</div><div style="font-size:11px;color:#B0A99E;line-height:1.5;">${info.desc}</div></div><div style="font-size:12px;color:#B0A99E;flex-shrink:0;">${score}分</div></div>`;}).join('')}</div></div></div>`;
  const top3=ranked.slice(0,3);const maxD=Math.max(...ranked.map(r=>r.d));
  body+=`<div class="result-section"><div class="section-label">信仰类型相似度</div>${top3.map((t,i)=>`<div style="padding:12px 0;border-bottom:1px solid #F4F0EB;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:5px;"><span style="font-size:11px;color:#B0A99E;width:16px;flex-shrink:0;">${i+1}</span><span style="width:8px;height:8px;border-radius:50%;background:${t.color};display:inline-block;flex-shrink:0;"></span><span style="font-size:14px;font-weight:500;flex:1;">${t.name}</span><div style="width:80px;height:5px;background:#E8E3DC;border-radius:3px;overflow:hidden;flex-shrink:0;"><div style="height:5px;border-radius:3px;width:${Math.round((1-t.d/maxD)*100)}%;background:${t.color};"></div></div></div><div style="font-size:12px;color:#B0A99E;line-height:1.6;padding-left:26px;">${t.rankDesc}</div></div>`).join('')}</div>`;
  const otherMissions=MISSION_TYPES.filter(m=>m.name!==mission.name);
  body+=`<div class="result-section"><div class="section-label">呼召类型</div><div style="background:${mission.light};border-radius:8px;padding:18px 20px;margin-bottom:14px;"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><div style="width:40px;height:40px;border-radius:50%;background:${mission.color};display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0;">${mission.icon}</div><div><div style="font-size:17px;font-weight:500;color:${mission.color};margin-bottom:2px;">${mission.name}</div><div style="font-size:12px;color:#7A7568;">${mission.desc}</div></div></div><div style="font-size:13px;color:#444441;line-height:1.8;border-top:1px solid rgba(0,0,0,.07);padding-top:12px;">${mission.detail}</div></div><div style="background:#fff;border-radius:8px;border:1px solid #E8E3DC;padding:14px 16px;"><div style="font-size:10px;font-weight:500;letter-spacing:.4px;color:#B0A99E;text-transform:uppercase;margin-bottom:10px;">其他呼召类型 — 点击了解</div><div style="display:flex;flex-wrap:wrap;gap:7px;" id="missionChips">${otherMissions.map((m,idx)=>`<button onclick="toggleMissionChip(${idx})" data-idx="${idx}" style="font-size:12px;padding:5px 13px;border-radius:20px;background:#F8F6F1;color:#7A7568;border:1px solid #E8E3DC;cursor:pointer;transition:all .15s;font-family:'Noto Sans SC',sans-serif;">${m.name}</button>`).join('')}</div><div id="missionDetail" style="margin-top:0;overflow:hidden;transition:all .3s;max-height:0;"></div></div></div>`;
  body+=`<script>window._otherMissions=${JSON.stringify(otherMissions.map(m=>({name:m.name,desc:m.desc,detail:m.detail,color:m.color,light:m.light,icon:m.icon})))};window._activeMissionIdx=null;function toggleMissionChip(idx){const btns=document.querySelectorAll('#missionChips button');const detail=document.getElementById('missionDetail');const m=window._otherMissions[idx];if(window._activeMissionIdx===idx){window._activeMissionIdx=null;detail.style.maxHeight='0';detail.innerHTML='';btns.forEach(b=>{b.style.background='#F8F6F1';b.style.color='#7A7568';b.style.borderColor='#E8E3DC';});}else{window._activeMissionIdx=idx;btns.forEach((b,i)=>{if(i===idx){b.style.background=m.light;b.style.color=m.color;b.style.borderColor=m.color;}else{b.style.background='#F8F6F1';b.style.color='#7A7568';b.style.borderColor='#E8E3DC';}});detail.innerHTML=\`<div style="background:\${m.light};border-radius:6px;padding:14px 16px;margin-top:10px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><div style="width:28px;height:28px;border-radius:50%;background:\${m.color};display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;">\${m.icon}</div><div><div style="font-size:13px;font-weight:500;color:\${m.color};">\${m.name}</div><div style="font-size:11px;color:#7A7568;">\${m.desc}</div></div></div><div style="font-size:12px;color:#444441;line-height:1.75;">\${m.detail}</div></div>\`;detail.style.maxHeight='300px';}}<\/script>`;
  const enc=best.encourage;
  body+=`<div class="encourage-block"><div class="encourage-verse">${enc.verse}</div><div class="encourage-ref">${enc.ref}</div><div class="encourage-msg">${enc.msg}</div></div>`;
  document.getElementById('resultBody').innerHTML=body;show('result');
}
function buildRadar(norm,best){
  const W=300,H=300,cx=150,cy=150,r=80,N=4;
  const pts=AXIS_4.map((ax,i)=>{const a=Math.PI*2*i/N-Math.PI/2,v=norm[ax]/100;return[cx+r*v*Math.cos(a),cy+r*v*Math.sin(a)];});
  const bg=AXIS_4.map((_,i)=>{const a=Math.PI*2*i/N-Math.PI/2;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];});
  const toP=arr=>arr.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';
  const grid=[.25,.5,.75,1].map(s=>{const gp=AXIS_4.map((_,i)=>{const a=Math.PI*2*i/N-Math.PI/2;return[cx+r*s*Math.cos(a),cy+r*s*Math.sin(a)];});return`<path d="${toP(gp)}" fill="none" stroke="#E8E3DC" stroke-width="1"/>`;}).join('');
  const lblDefs=[{ax:'品格',x:150,y:48,anchor:'middle'},{ax:'灵性',x:252,y:154,anchor:'start'},{ax:'环境',x:150,y:260,anchor:'middle'},{ax:'能量',x:68,y:154,anchor:'middle'}];
  const lbls=lblDefs.map(d=>`<text x="${d.x}" y="${d.y}" text-anchor="${d.anchor}" font-size="12" fill="${AXIS_COLORS[d.ax]}" font-family="'Noto Sans SC',sans-serif" font-weight="500">${d.ax}</text>`).join('');
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${grid}<path d="${toP(bg)}" fill="none" stroke="#D5CEC5" stroke-width="1"/><path d="${toP(pts)}" fill="${best.color}" fill-opacity="0.15" stroke="${best.color}" stroke-width="2"/>${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="${best.color}"/>`).join('')}${lbls}</svg>`;
}
function saveAsJpg(){
  const btn=event.target;btn.textContent='正在生成图片...';btn.disabled=true;
  const el=document.getElementById('screen-result');const prevScroll=window.scrollY;window.scrollTo(0,0);
  setTimeout(()=>{html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#F8F6F1',scrollY:0,windowWidth:document.documentElement.scrollWidth,windowHeight:el.scrollHeight}).then(canvas=>{
    const reset=()=>{btn.textContent='将结果保存为图片 (JPG)';btn.disabled=false;window.scrollTo(0,prevScroll);};
    canvas.toBlob(blob=>{
      const fileName='信仰类型评估结果.jpg';const isIOS=/iPhone|iPad|iPod/i.test(navigator.userAgent);
      if(isIOS&&navigator.share){const file=new File([blob],fileName,{type:'image/jpeg'});if(navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:'我的信仰类型评估结果'}).then(reset).catch(()=>{const url=URL.createObjectURL(blob);window.open(url,'_blank');reset();});return;}}
      const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fileName;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},3000);reset();
    },'image/jpeg',0.92);
  }).catch(()=>{btn.textContent='将结果保存为图片 (JPG)';btn.disabled=false;window.scrollTo(0,prevScroll);});},120);
}
function saveAsPdf(){
  const best=state.lastResult.ranked[0],norm=state.lastResult.norm,analysis=best.analyze(norm,state.answers),enc=best.encourage,aptRanked=state.lastResult.aptRanked;
  const mission=getMissionType(norm,state.answers);const aptTop=aptRanked.slice(0,2);const top3=state.lastResult.ranked.slice(0,3);
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>信仰类型评估结果</title><style>body{font-family:'Noto Sans SC',sans-serif;background:#fff;color:#1A1814;padding:40px 48px;max-width:700px;margin:0 auto;}h1{font-family:'Noto Serif SC',serif;font-size:24px;color:${best.color};margin-bottom:6px;}.divider{height:1px;background:#E8E3DC;margin:20px 0;}.label{font-size:10px;font-weight:500;letter-spacing:.4px;color:#B0A99E;text-transform:uppercase;margin-bottom:10px;}.score-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}.score-name{width:44px;font-size:12px;font-weight:500;}.bar-bg{flex:1;height:6px;background:#F0EDE8;border-radius:3px;overflow:hidden;}.bar-fill{height:6px;border-radius:3px;}p{font-size:13px;line-height:1.8;color:#7A7568;margin-bottom:6px;}.verse{font-family:'Noto Serif SC',serif;font-size:14px;line-height:1.9;color:#1A1814;text-align:center;white-space:pre-line;font-style:italic;margin:20px 0 6px;}.enc-ref{font-size:11px;color:#B0A99E;text-align:center;margin-bottom:10px;}.enc-msg{font-size:12px;color:#7A7568;line-height:1.8;text-align:center;}.q-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #F4F0EB;font-size:11px;color:#7A7568;}.q-num{width:24px;flex-shrink:0;color:#B0A99E;}.q-text{flex:1;}.q-ans{width:24px;text-align:right;font-weight:500;color:#1A1814;}@media print{body{padding:24px 32px;}@page{margin:0;}}</style></head><body>
  <h1>${best.name}</h1><p style="color:#7A7568;margin-bottom:4px;">${best.sub}</p><p style="font-size:13px;color:#B0A99E;font-style:italic;margin-bottom:28px;">${best.quote}</p><div class="divider"></div>
  <div class="label">各领域分数</div>${AXIS_4.map(ax=>`<div class="score-row"><div class="score-name" style="color:${AXIS_COLORS[ax]}">${ax}</div><div class="bar-bg"><div class="bar-fill" style="width:${norm[ax]}%;background:${AXIS_COLORS[ax]}"></div></div><span style="font-size:12px;font-weight:500;width:28px;text-align:right;">${norm[ax]}</span></div>`).join('')}
  <div class="divider"></div><div class="label">核心特质</div>${analysis.traits.map(t=>`<p>${t}</p>`).join('')}
  <div class="label" style="margin-top:14px">前进方向</div>${analysis.growth.map(t=>`<p>${t}</p>`).join('')}
  <div class="divider"></div><div class="verse">${enc.verse}</div><div class="enc-ref">${enc.ref}</div><div class="enc-msg">${enc.msg}</div>
  <div class="divider"></div><div class="label">答题记录（74题）</div>${QUESTIONS.map(q=>`<div class="q-row"><span class="q-num">${q.n}</span><span class="q-text">${q.t}</span><span class="q-ans">${state.answers[q.n]||'—'}</span></div>`).join('')}
  <script>window.onload=()=>{setTimeout(()=>window.print(),400);}<\/script></body></html>`);win.document.close();
}
function retry(){startAssessment();}
