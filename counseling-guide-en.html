<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faith Type Counseling Guide — For Counselors</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap');
:root{
  --bg:#F8F6F1;--white:#FFFFFF;--text:#1A1814;--muted:#7A7568;--light:#B0A99E;
  --border:#E8E3DC;--border-light:#F4F0EB;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:13px;font-weight:500;color:var(--muted);letter-spacing:.3px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.select-wrap{position:relative;}
.type-select{appearance:none;-webkit-appearance:none;background:var(--white);border:1px solid var(--border);border-radius:4px;padding:8px 36px 8px 14px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;outline:none;min-width:210px;}
.select-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;width:12px;height:12px;color:var(--light);}
.btn-print{padding:8px 16px;background:var(--text);color:var(--white);border:none;border-radius:4px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;letter-spacing:.3px;}

.main{max-width:760px;margin:0 auto;padding:32px 24px 80px;}

.cover{padding:40px 40px 36px;background:var(--white);border-radius:8px;border-top:4px solid var(--type-color,#534AB7);margin-bottom:24px;}
.cover-eyebrow{font-size:10px;font-weight:500;letter-spacing:1.2px;color:var(--light);text-transform:uppercase;margin-bottom:14px;}
.cover-badge{display:inline-flex;align-items:center;gap:8px;border-radius:4px;padding:7px 14px;margin-bottom:18px;}
.cover-badge-dot{width:8px;height:8px;border-radius:50%;}
.cover-badge-text{font-size:12px;font-weight:500;letter-spacing:.3px;}
.cover-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;line-height:1.3;margin-bottom:8px;}
.cover-sub{font-size:14px;color:var(--muted);margin-bottom:24px;}
.cover-chips{display:flex;flex-wrap:wrap;gap:10px;}
.chip{font-size:11px;color:var(--muted);background:var(--bg);padding:5px 12px;border-radius:20px;border:1px solid var(--border);}

.toc{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-bottom:24px;}
.toc-label{font-size:10px;font-weight:500;letter-spacing:.8px;color:var(--light);text-transform:uppercase;margin-bottom:14px;}
.toc-list{display:flex;flex-direction:column;gap:7px;}
.toc-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.toc-num{font-size:11px;color:var(--light);width:22px;flex-shrink:0;}
.toc-name{flex:1;}
.toc-dots{flex:1;border-bottom:1px dotted var(--border);margin:0 4px;}

.section{background:var(--white);border-radius:8px;border:1px solid var(--border);padding:28px 32px;margin-bottom:16px;}
.sec-num{font-size:10px;font-weight:500;letter-spacing:.8px;color:var(--light);text-transform:uppercase;margin-bottom:6px;}
.sec-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px;}
.sec-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:20px;}

.profile-box{border-radius:6px;padding:18px 20px;margin-bottom:0;}
.profile-label{font-size:10px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;margin-bottom:12px;}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pi{display:flex;flex-direction:column;gap:3px;}
.pi-label{font-size:11px;}
.pi-value{font-size:13px;font-weight:500;line-height:1.5;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:0;}
.card{border-radius:6px;padding:16px 18px;}
.card-head{font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.card-item{font-size:13px;line-height:1.65;padding-left:12px;position:relative;margin-bottom:5px;color:#444441;}
.card-item:last-child{margin-bottom:0;}
.card-item::before{content:'·';position:absolute;left:0;color:#888780;}

.ap-table{width:100%;border-collapse:collapse;font-size:13px;}
.ap-table th{text-align:left;font-size:10px;font-weight:500;letter-spacing:.5px;color:var(--light);text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--border);}
.ap-table td{padding:11px 10px;border-bottom:1px solid var(--border-light);vertical-align:top;color:#444441;line-height:1.65;}
.ap-table tr:last-child td{border-bottom:none;}
.tag{display:inline-block;font-size:10px;font-weight:500;padding:3px 9px;border-radius:10px;white-space:nowrap;}
.tag-do{background:#EAF3DE;color:#27500A;}
.tag-dont{background:#FAECE7;color:#712B13;}
.ap-table td:first-child{width:70px;padding-right:4px;}

.axis-list{display:flex;flex-direction:column;gap:10px;}
.ai-row{display:flex;gap:12px;align-items:flex-start;}
.ai-badge{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px;min-width:100px;text-align:center;}
.ai-text{font-size:13px;color:#444441;line-height:1.65;}

.q-list{display:flex;flex-direction:column;gap:10px;}
.q-item{background:var(--bg);border-radius:6px;padding:13px 16px 13px 28px;font-size:13px;color:#444441;line-height:1.7;position:relative;}
.q-item::before{content:'\201C';position:absolute;left:12px;top:12px;font-size:18px;color:var(--light);font-family:'Playfair Display',serif;}

.watch-box{border-radius:0 6px 6px 0;padding:14px 18px;margin-bottom:12px;}
.watch-box:last-child{margin-bottom:0;}
.watch-label{font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.watch-text{font-size:13px;line-height:1.7;}

.growth-box{border-radius:6px;padding:20px 22px;}
.growth-label{font-size:10px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;margin-bottom:14px;}
.growth-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.gi{display:flex;flex-direction:column;gap:3px;}
.gi-label{font-size:11px;}
.gi-value{font-size:13px;font-weight:500;line-height:1.5;}

.scripture{text-align:center;padding:28px 24px;border-top:1px solid var(--border);margin-top:16px;}
.verse{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);line-height:1.9;margin-bottom:8px;font-style:italic;white-space:pre-line;}
.verse-ref{font-size:11px;color:var(--light);}

.mission-list{display:flex;flex-direction:column;gap:0;}
.mission-item{display:flex;align-items:flex-start;gap:14px;padding:13px 0;border-bottom:1px solid var(--border-light);}
.mission-item:last-child{border-bottom:none;}
.mission-num{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;width:24px;flex-shrink:0;line-height:1.5;}
.mission-text{font-size:13px;color:#444441;line-height:1.75;flex:1;}
.mission-intro{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px;padding:12px 16px;border-left:3px solid var(--border);border-radius:0 4px 4px 0;}

.guide-footer{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.footer-l{font-size:11px;color:var(--light);}

.divider{height:1px;background:var(--border);margin:20px 0;}

@media print{
  .topbar{display:none;}
  .main{max-width:100%;padding:0;margin:0;}
  body{background:#fff;}
  .cover,.section,.toc,.guide-footer{border-radius:0;border-left:none;border-right:none;page-break-inside:avoid;}
  .cover{border-top-width:3px;margin-bottom:0;}
  .section{margin-bottom:0;border-bottom:1px solid var(--border);}
  .btn-print{display:none;}
}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Faith Type Counseling Guide &middot; For Counselors</span>
  <div class="topbar-right">
    <div class="select-wrap">
      <select class="type-select" id="typeSelect" onchange="switchType(this.value)">
        <option value="0">Type 01 &mdash; The Root</option>
        <option value="1">Type 02 &mdash; The Seed</option>
        <option value="2">Type 03 &mdash; The Ground</option>
        <option value="3">Type 04 &mdash; The Fruit</option>
        <option value="4">Type 05 &mdash; The Wilderness</option>
        <option value="5">Type 06 &mdash; The Seeker</option>
        <option value="6">Type 07 &mdash; The Endurer</option>
        <option value="7">Type 08 &mdash; The Beginner</option>
      </select>
      <svg class="select-arrow" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <button class="btn-print" onclick="window.print()">Print / PDF</button>
  </div>
</div>

<div class="main" id="guideContent"></div>

function switchType(idx) {
  const t = TYPES[parseInt(idx)];
  document.getElementById('guideContent').innerHTML = buildGuide(t);
  document.documentElement.style.setProperty('--type-color', t.color);
}

function buildGuide(t) {
  const profileKeys = Object.keys(t.profile);
  const profileHTML = profileKeys.map(k => `
    <div class="pi">
      <div class="pi-label" style="color:${t.color}">${k}</div>
      <div class="pi-value" style="color:${t.dark}">${t.profile[k]}</div>
    </div>`).join('');

  const approachRows = t.approaches.map(a => `
    <tr>
      <td><span class="tag tag-${a.tag}">${a.tag === 'do' ? 'Do' : 'Avoid'}</span></td>
      <td>${a.how}</td>
      <td>${a.why}</td>
    </tr>`).join('');

  const axisRows = t.axes_guide.map(a => `
    <div class="ai-row">
      <span class="ai-badge" style="background:${a.bg};color:${a.color}">${a.axis}</span>
      <span class="ai-text">${a.text}</span>
    </div>`).join('');

  const watchHTML = t.warnings.map(w => `
    <div class="watch-box" style="background:${w.color};border-left:3px solid ${w.border}">
      <div class="watch-label" style="color:${w.labelColor}">${w.label}</div>
      <div class="watch-text" style="color:${w.textColor}">${w.text}</div>
    </div>`).join('');

  const growthKeys = Object.keys(t.growth);
  const growthHTML = growthKeys.map(k => `
    <div class="gi">
      <div class="gi-label" style="color:${t.color}">${k}</div>
      <div class="gi-value" style="color:${t.dark}">${t.growth[k]}</div>
    </div>`).join('');

  const tocItems = ['Type Profile','Strengths & Cautions','Counseling Approach Principles','Axis Score Interpretation','Recommended Questions','Patterns to Watch','Growth Direction','Faith Growth Missions'];

  return `
  <div class="cover" style="border-top-color:${t.color}">
    <div class="cover-eyebrow">Faith Type Counseling Guide &middot; For Counselors</div>
    <div class="cover-badge" style="background:${t.light}">
      <div class="cover-badge-dot" style="background:${t.color}"></div>
      <span class="cover-badge-text" style="color:${t.dark}">Type ${t.num} &mdash; ${t.name}</span>
    </div>
    <div class="cover-title">How to Counsel<br>${t.name} Types</div>
    <div class="cover-sub">${t.sub} &middot; An Approach Guide for Counselors</div>
    <div class="cover-chips">
      <span class="chip">Key Axes: ${t.axes}</span>
      <span class="chip">Difficulty: ${t.diff}</span>
      <span class="chip">Core Need: ${t.need}</span>
    </div>
  </div>

  <div class="toc">
    <div class="toc-label">Contents of This Guide</div>
    <div class="toc-list">
      ${tocItems.map((s,i)=>`
      <div class="toc-item">
        <span class="toc-num">0${i+1}</span>
        <span class="toc-name">${s}</span>
        <span class="toc-dots"></span>
      </div>`).join('')}
    </div>
  </div>

  <div class="section">
    <div class="sec-num">Section 01</div>
    <div class="sec-title">Type Profile</div>
    <div class="sec-desc">Grasp the core characteristics of this type first. Read this page before the counseling session.</div>
    <div class="profile-box" style="background:${t.light}">
      <div class="profile-label" style="color:${t.color}">Core Profile</div>
      <div class="profile-grid">${profileHTML}</div>
    </div>
  </div>

  <div class="section">
    <div class="sec-num">Section 02</div>
    <div class="sec-title">Strengths &amp; Cautions</div>
    <div class="sec-desc">View together the resources this type has and the vulnerable points that are easy to miss in counseling.</div>
    <div class="two-col">
      <div class="card" style="background:#EAF3DE">
        <div class="card-head" style="color:#3B6D11">Strength Resources</div>
        ${t.strengths.map(s=>`<div class="card-item">${s}</div>`).join('')}
      </div>
      <div class="card" style="background:#FAEEDA">
        <div class="card-head" style="color:#854F0B">Points to Watch</div>
        ${t.cautions.map(c=>`<div class="card-item">${c}</div>`).join('')}
      </div>
    </div>
  </div>

  <div class="section">

    <div class="sec-desc">Effective counseling methods for this type and approaches to avoid. Can be applied directly in counseling sessions.</div>
    <table class="ap-table">

      <tbody>${approachRows}</tbody>
    </table>
  </div>

  <div class="section">

  <div class="section">

  </div>

  <div class="section">

      <div class="growth-label" style="color:${t.color}">Growth Roadmap</div>
      <div class="growth-grid">${growthHTML}</div>
    </div>
    <div class="scripture">

      <div class="verse-ref">${t.verseRef} &nbsp;&mdash;&nbsp; ${t.scripture_note}</div>

  <div class="section">
    <div class="sec-num">Section 08</div>
    <div class="sec-title">Faith Growth Missions</div>
    <div class="sec-desc">Practical missions to suggest to the counselee after the session. Do not give all at once &mdash; select 1&ndash;2 appropriate to their current state.</div>
    <div class="mission-intro">${t.missionIntro}</div>
    <div class="mission-list">
      ${t.missions.map((m,i)=>`
      <div class="mission-item">
        <div class="mission-num" style="color:${t.color}">${i+1}</div>
        <div class="mission-text">${m}</div>
      </div>`).join('')}
    </div>
  </div>

  <div class="guide-footer">
    <span class="footer-l">Faith Type Counseling Guide &middot; For Counselors &middot; Confidential &mdash; Not for External Distribution</span>
    <span class="footer-l">${t.name} | Guide ${t.num}</span>
  </div>`;
}

document.documentElement.style.setProperty('--type-color', TYPES[0].color);
document.getElementById('guideContent').innerHTML = buildGuide(TYPES[0]);
</script>
</body>
</html>
